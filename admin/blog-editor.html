<!DOCTYPE html>
<html>
<head>
    <title>Minimal Blog CMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
        }
        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            margin-right: 5px;
        }
        #status {
            margin-top: 15px;
        }
        .draft {
            color: orange;
        }
        .published {
            color: green;
        }
        .delete-btn {
            background: #c0392b;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h1>Blog CMS</h1>

<div>
    <h2>Existing Posts</h2>
    <ul id="postList"></ul>
</div>

<hr>

<input type="hidden" id="slug" />

<input id="title" placeholder="Title" />
<input id="description" placeholder="Short description" />
<input id="tags" placeholder="Tags (comma separated)" />
<textarea id="content" rows="12" placeholder="Markdown content"></textarea>

<button onclick="savePost()">Save Draft</button>
<button onclick="publishPost()">Publish</button>
<button onclick="clearForm()">New Post</button>

<p id="status"></p>

<script>
async function loadPosts() {
    const res = await fetch("/posts");
    const posts = await res.json();

    const list = document.getElementById("postList");
    list.innerHTML = "";

    posts.forEach(post => {
        const li = document.createElement("li");

        const statusClass = post.status === "published"
            ? "published"
            : "draft";

        li.innerHTML = `
            <strong>${post.title}</strong> 
            <span class="${statusClass}">
                (${post.status || "draft"})
            </span>
            <button onclick="editPost('${post.slug}')">Edit</button>
            <button class="delete-btn" onclick="deletePost('${post.slug}')">
                Delete
            </button>
        `;

        list.appendChild(li);
    });
}

async function editPost(slug) {
    const res = await fetch(`/posts/${slug}`);
    const post = await res.json();

    document.getElementById("slug").value = slug;
    document.getElementById("title").value = post.title;
    document.getElementById("description").value = post.description;
    document.getElementById("tags").value = post.tags || "";
    document.getElementById("content").value = post.content;
}

async function savePost() {
    const slug = document.getElementById("slug").value;
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const tags = document.getElementById("tags").value;
    const content = document.getElementById("content").value;

    const res = await fetch("/save-post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            slug,
            title,
            description,
            tags,
            content,
            status: "draft"
        })
    });

    const result = await res.json();

    document.getElementById("status").innerText =
        result.success ? "Draft saved!" : result.error;

    loadPosts();
}

async function publishPost() {
    const slug = document.getElementById("slug").value;

    if (!slug) {
        document.getElementById("status").innerText =
            "You must save the post before publishing.";
        return;
    }

    const res = await fetch(`/publish/${slug}`, {
        method: "POST"
    });

    const result = await res.json();

    document.getElementById("status").innerText =
        result.success ? "Post published!" : result.error;

    loadPosts();
}

async function deletePost(slug) {
    const confirmed = confirm("Are you sure you want to delete this post?");
    if (!confirmed) return;

    const res = await fetch(`/posts/${slug}`, {
        method: "DELETE"
    });

    const result = await res.json();

    document.getElementById("status").innerText =
        result.success ? "Post deleted!" : result.error;

    // If deleted post was open in editor, clear form
    if (document.getElementById("slug").value === slug) {
        clearForm();
    }

    loadPosts();
}

function clearForm() {
    document.getElementById("slug").value = "";
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("tags").value = "";
    document.getElementById("content").value = "";
}

loadPosts();
</script>

</body>
</html>
